name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm run test -- --filter=@wisender/api

      - name: Build API (debug)
        working-directory: ./apps/api
        run: |
          echo "=== nest build start ==="
          npx nest build 2>&1 || true
          echo "=== exit code: $? ==="
          echo "=== dist folder ==="
          ls -la dist/ 2>/dev/null || echo "dist not created"
